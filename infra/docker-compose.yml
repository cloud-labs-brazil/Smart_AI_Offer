# Smart Offer — Docker Compose
# 3-service stack: db, backend, frontend
# @see .claude/rules/03-architecture-stack.md
# @see .claude/rules/07-quality-security-devops.md

services:
  db:
    image: postgres:15-alpine
    container_name: smartoffer-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartoffer}
      POSTGRES_USER: ${POSTGRES_USER:-smartoffer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartoffer}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: smartoffer-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-smartoffer}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-smartoffer}
      CORS_ORIGINS: '["http://localhost:3000"]'
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ../apps/web
      dockerfile: ../../infra/Dockerfile.web
    container_name: smartoffer-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-8000}
      NEXT_PUBLIC_GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
    driver: local
